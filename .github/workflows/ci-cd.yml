name: CI/CD Pipeline - Fraud Detection v2.0

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run tests
      run: |
        python -c "import numpy; print('NumPy OK')"
        python -c "import streamlit; print('Streamlit OK')"
    
    - name: Test app imports
      run: |
        python -c "import sys; sys.path.append('.'); print('App imports OK')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Create deployment tag
      run: |
        git tag "v2.0-$(date +'%Y%m%d-%H%M%S')"
        git push --tags
    
    - name: Deployment complete
      run: |
        echo "✅ Deployment complete!"
        echo "🔗 App URL:"https://fraud-detection-mxehzesljwhhragufwudo5.streamlit.app/"